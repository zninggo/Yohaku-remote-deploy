name: Build and Deploy (remix)

on:
  workflow_dispatch:
    inputs:
      force_build:
        description: 'Force rebuild even if hash matches'
        required: false
        default: 'false'
        type: boolean

  repository_dispatch:
    types: [trigger-remix]

permissions:
  contents: write
  packages: write

concurrency:
  group: ${{ github.workflow }}-remix
  cancel-in-progress: true

env:
  HASH_FILE: build_hash.remix
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/yohaku
  SOURCE_REF: refactor/remix
  ROUTE: remix

jobs:
  prepare:
    name: Prepare
    runs-on: ubuntu-latest
    if: ${{ !startsWith(github.event.head_commit.message, 'chore(hash-') }}

    outputs:
      hash_content: ${{ steps.read_hash.outputs.hash_content }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          token: ${{ secrets.GH_PAT }}

      - name: Read HASH_FILE content
        id: read_hash
        run: |
          content=$(cat ${{ env.HASH_FILE }}) || true
          echo "hash_content=$content" >> "$GITHUB_OUTPUT"

  check:
    name: Check Should Rebuild
    runs-on: ubuntu-latest
    needs: prepare
    outputs:
      canceled: ${{ steps.compare.outputs.canceled }}
      sha_full: ${{ steps.compare.outputs.sha_full }}
      sha_short: ${{ steps.compare.outputs.sha_short }}

    steps:
      - uses: actions/checkout@v6
        with:
          repository: innei-dev/yohaku
          token: ${{ secrets.GH_PAT }}
          ref: ${{ env.SOURCE_REF }}
          fetch-depth: 0
          lfs: true
          submodules: recursive

      - name: Compare hash
        id: compare
        env:
          FILE_HASH: ${{ needs.prepare.outputs.hash_content }}
          FORCE_BUILD: ${{ github.event.inputs.force_build }}
        run: |
          file_hash=$FILE_HASH
          current_sha=$(git rev-parse HEAD)
          current_hash=$(git rev-parse --short HEAD)
          echo "File Hash: $file_hash"
          echo "Current Git SHA: $current_sha"
          echo "Current Git Hash: $current_hash"
          echo "Force Build: $FORCE_BUILD"
          echo "sha_full=$current_sha" >> "$GITHUB_OUTPUT"
          echo "sha_short=$current_hash" >> "$GITHUB_OUTPUT"
          if [ "$FORCE_BUILD" == "true" ]; then
            echo "Force build enabled. Continuing workflow."
          elif [ "$file_hash" == "$current_hash" ]; then
            echo "Hashes match. Stopping workflow."
            echo "canceled=true" >> $GITHUB_OUTPUT
          else
            echo "Hashes do not match. Continuing workflow."
          fi

  build:
    name: Build and Push to GHCR
    runs-on: ubuntu-latest
    needs: check
    if: ${{ needs.check.outputs.canceled != 'true' }}

    outputs:
      sha_short: ${{ needs.check.outputs.sha_short }}
      sha_full: ${{ needs.check.outputs.sha_full }}

    steps:
      - uses: actions/checkout@v6
        with:
          repository: innei-dev/yohaku
          token: ${{ secrets.GH_PAT }}
          ref: ${{ needs.check.outputs.sha_full }}
          fetch-depth: 1
          lfs: true
          submodules: recursive

      - name: Checkout LFS objects
        run: git lfs checkout

      - name: Install pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=remix
            type=raw,value=remix-${{ needs.check.outputs.sha_short }}

      - name: Build and Push
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            BASE_URL=${{ secrets.BASE_URL }}
            API_URL=${{ secrets.BASE_URL }}/api/v3
            NEXT_PUBLIC_API_URL=${{ secrets.BASE_URL }}/api/v3
            NEXT_PUBLIC_GATEWAY_URL=${{ secrets.BASE_URL }}
            NEXT_PUBLIC_CLIENT_API_URL=${{ secrets.BASE_URL }}/api/v3
          cache-from: type=gha,scope=remix
          cache-to: type=gha,mode=max,scope=remix

  deploy:
    name: Deploy via Dokploy
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Trigger Dokploy Deployment
        run: |
          response=$(curl -s -w "\n%{http_code}" -X POST \
            "${{ secrets.DOKPLOY_URL }}/api/application.deploy" \
            -H "accept: application/json" \
            -H "Content-Type: application/json" \
            -H "x-api-key: ${{ secrets.DOKPLOY_API_TOKEN }}" \
            -d '{"applicationId": "${{ secrets.DOKPLOY_APP_ID_REMIX }}"}')

          http_code=$(echo "$response" | tail -n1)
          body=$(echo "$response" | sed '$d')

          echo "Response: $body"
          echo "HTTP Status: $http_code"

          if [ "$http_code" -ge 200 ] && [ "$http_code" -lt 300 ]; then
            echo "Deployment triggered successfully"
          else
            echo "Failed to trigger deployment"
            exit 1
          fi

      - name: After deploy script
        env:
          AFTER_DEPLOY_SCRIPT: ${{ secrets.AFTER_DEPLOY_SCRIPT }}
          HASH: ${{ needs.build.outputs.sha_short }}
        run: |
          if [ -n "$AFTER_DEPLOY_SCRIPT" ]; then
            eval "$AFTER_DEPLOY_SCRIPT"
          fi

      - name: Notify Telegram
        if: ${{ success() }}
        continue-on-error: true
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          SHA_SHORT: ${{ needs.build.outputs.sha_short }}
          SHA_FULL: ${{ needs.build.outputs.sha_full }}
          APP_REPO_SLUG: innei-dev/yohaku
          ROUTE: ${{ env.ROUTE }}
          SOURCE_REF: ${{ env.SOURCE_REF }}
          FORCE_BUILD: ${{ github.event.inputs.force_build || '' }}
          GITHUB_REF_NAME: ${{ github.ref_name }}
          GITHUB_ACTOR: ${{ github.actor }}
          GITHUB_EVENT_NAME: ${{ github.event_name }}
          GITHUB_WORKFLOW: ${{ github.workflow }}
          GITHUB_RUN_NUMBER: ${{ github.run_number }}
          GITHUB_RUN_ATTEMPT: ${{ github.run_attempt }}
          COMMIT_MSG_HEAD: ${{ github.event_name == 'push' && github.event.head_commit.message || '' }}
        run: |
          if [ -z "${TELEGRAM_BOT_TOKEN:-}" ]; then
            echo "::notice::TELEGRAM_BOT_TOKEN is not set; skipping Telegram notification."
            exit 0
          fi
          RUN_URL="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
          COMMIT_URL="https://github.com/${APP_REPO_SLUG}/commit/${SHA_FULL}"
          IMAGE_ROLLING="ghcr.io/${GITHUB_REPOSITORY_OWNER}/yohaku:${ROUTE}"
          IMAGE_SHA="ghcr.io/${GITHUB_REPOSITORY_OWNER}/yohaku:${ROUTE}-${SHA_SHORT}"
          GH_PKGS_URL="https://github.com/${GITHUB_REPOSITORY_OWNER}?tab=packages"
          COMPLETED_AT="$(date -u '+%Y-%m-%d %H:%M:%S UTC')"
          export RUN_URL COMMIT_URL IMAGE_ROLLING IMAGE_SHA GH_PKGS_URL COMPLETED_AT

          MSG="$(python3 <<'PY'
          import html
          import os

          def esc(s: str) -> str:
              return html.escape(s or "", quote=False)

          sha_short_disp = esc(os.environ["SHA_SHORT"])
          sha_full_raw = os.environ["SHA_FULL"]
          repo = esc(os.environ["GITHUB_REPOSITORY"])
          ref = esc(os.environ["GITHUB_REF_NAME"])
          actor = esc(os.environ["GITHUB_ACTOR"])
          event = esc(os.environ["GITHUB_EVENT_NAME"])
          wf = esc(os.environ["GITHUB_WORKFLOW"])
          rn = esc(os.environ["GITHUB_RUN_NUMBER"])
          ra = esc(os.environ["GITHUB_RUN_ATTEMPT"])
          run_url = os.environ["RUN_URL"]
          commit_url_href = os.environ["COMMIT_URL"]
          gh_pkgs_href = os.environ["GH_PKGS_URL"]
          owner_disp = esc(os.environ["GITHUB_REPOSITORY_OWNER"])
          image_rolling = esc(os.environ["IMAGE_ROLLING"])
          image_sha = esc(os.environ["IMAGE_SHA"])
          completed = esc(os.environ["COMPLETED_AT"])
          sha_ci = esc(os.environ["GITHUB_SHA"][:40])
          app_slug = esc(os.environ["APP_REPO_SLUG"])
          route = esc(os.environ["ROUTE"])
          source_ref = esc(os.environ["SOURCE_REF"])

          force = (os.environ.get("FORCE_BUILD") or "").strip().lower()

          head_msg = (os.environ.get("COMMIT_MSG_HEAD") or "").strip()
          head_preview = ""
          if head_msg:
              first = head_msg.splitlines()[0]
              one_line = first[:220]
              if len(first) > 220:
                  one_line += "…"
              head_preview = f"<b>编排仓库 HEAD 说明</b>\n{esc(one_line)}"

          parts: list[str] = [f"<b>🚀 yohaku 部署成功 [{route}]</b>"]
          parts.append(f"<b>源分支</b>: <code>{source_ref}</code>")
          if force == "true":
              parts.append("⚙️ <b>强制重建</b>: 是")

          parts.extend(
              [
                  "",
                  "<b>📦 镜像 (GHCR)</b>",
                  f"• <code>{image_rolling}</code>",
                  f"• <code>{image_sha}</code>",
                  f'<a href="{gh_pkgs_href}">Packages（{owner_disp}）</a>',
                  "",
                  "<b>📎 应用源码（构建所用提交）</b>",
                  f"{app_slug} @ <code>{sha_short_disp}</code> · <code>{esc(sha_full_raw[:7])}</code>…",
                  f'<a href="{commit_url_href}">打开 innei-dev/yohaku 提交</a>',
                  "",
                  "<b>🔧 编排仓库 / CI 上下文</b>",
                  f"• 仓库: <code>{repo}</code>",
                  f"• 分支 / ref: <code>{ref}</code>",
                  f"• 触发者 · 事件: {actor} · <code>{event}</code>",
                  f"• Workflow: {wf} · #{rn} · attempt <code>{ra}</code>",
                  f"• 编排仓库 <code>GITHUB_SHA</code>: <code>{sha_ci}</code>",
              ]
          )

          if head_preview:
              parts.extend(["", head_preview])

          parts.extend(
              [
                  "",
                  f"<b>🕐 完成时间（UTC）</b> {completed}",
                  "",
                  f'<a href="{run_url}">在 GitHub Actions 打开本次运行</a>',
              ]
          )

          print("\n".join(parts))
          PY
          )"

          jq -n \
            --arg text "$MSG" \
            '{chat_id: "@order_usagi", text: $text, parse_mode: "HTML", disable_web_page_preview: true}' \
            | curl -sS -f -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
              -H "Content-Type: application/json" \
              -d @-

  store:
    name: Store artifact commit version
    runs-on: ubuntu-latest
    needs: [deploy, build]

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          token: ${{ secrets.GH_PAT }}
          persist-credentials: false
          fetch-depth: 0

      - name: Write hash to file
        env:
          SHA_SHORT: ${{ needs.build.outputs.sha_short }}
        run: echo $SHA_SHORT > ${{ env.HASH_FILE }}

      - name: Commit files
        env:
          SHA_SHORT: ${{ needs.build.outputs.sha_short }}
        run: |
          git config --local user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add ${{ env.HASH_FILE }}
          git commit -m "chore(hash-remix): update to $SHA_SHORT"

      - name: Push changes
        uses: ad-m/github-push-action@master
        with:
          github_token: ${{ secrets.GH_PAT }}
          branch: ${{ github.ref }}

  notify-failure:
    name: Notify Telegram (on failure)
    runs-on: ubuntu-latest
    needs: [prepare, check, build, deploy, store]
    if: ${{ always() && (needs.prepare.result == 'failure' || needs.check.result == 'failure' || needs.build.result == 'failure' || needs.deploy.result == 'failure' || needs.store.result == 'failure') }}

    steps:
      - name: Notify Telegram
        continue-on-error: true
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          RES_PREPARE: ${{ needs.prepare.result }}
          RES_CHECK: ${{ needs.check.result }}
          RES_BUILD: ${{ needs.build.result }}
          RES_DEPLOY: ${{ needs.deploy.result }}
          RES_STORE: ${{ needs.store.result }}
          SHA_SHORT: ${{ needs.check.outputs.sha_short || '' }}
          SHA_FULL: ${{ needs.check.outputs.sha_full || '' }}
          APP_REPO_SLUG: innei-dev/yohaku
          ROUTE: ${{ env.ROUTE }}
          SOURCE_REF: ${{ env.SOURCE_REF }}
          GITHUB_REF_NAME: ${{ github.ref_name }}
          GITHUB_ACTOR: ${{ github.actor }}
          GITHUB_EVENT_NAME: ${{ github.event_name }}
          GITHUB_WORKFLOW: ${{ github.workflow }}
          GITHUB_RUN_NUMBER: ${{ github.run_number }}
          GITHUB_RUN_ATTEMPT: ${{ github.run_attempt }}
          COMMIT_MSG_HEAD: ${{ github.event_name == 'push' && github.event.head_commit.message || '' }}
        run: |
          if [ -z "${TELEGRAM_BOT_TOKEN:-}" ]; then
            echo "::notice::TELEGRAM_BOT_TOKEN is not set; skipping Telegram notification."
            exit 0
          fi
          RUN_URL="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
          COMMIT_URL="https://github.com/${APP_REPO_SLUG}/commit/${SHA_FULL}"
          COMPLETED_AT="$(date -u '+%Y-%m-%d %H:%M:%S UTC')"
          export RUN_URL COMMIT_URL COMPLETED_AT

          MSG="$(python3 <<'PY'
          import html
          import os

          def esc(s: str) -> str:
              return html.escape(s or "", quote=False)

          jobs = [
              ("prepare", os.environ.get("RES_PREPARE") or ""),
              ("check", os.environ.get("RES_CHECK") or ""),
              ("build", os.environ.get("RES_BUILD") or ""),
              ("deploy", os.environ.get("RES_DEPLOY") or ""),
              ("store", os.environ.get("RES_STORE") or ""),
          ]
          failed = [name for name, r in jobs if r == "failure"]
          failed_line = esc(", ".join(failed) if failed else "unknown")

          sha_short = (os.environ.get("SHA_SHORT") or "").strip()
          sha_full = (os.environ.get("SHA_FULL") or "").strip()
          sha_short_disp = esc(sha_short) if sha_short else "—"
          sha_blob = ""
          if sha_full:
              sha_blob = (
                  f"{os.environ['APP_REPO_SLUG']} @ <code>{sha_short_disp}</code> · "
                  f"<code>{esc(sha_full[:7])}</code>…\n"
                  f'<a href="{os.environ["COMMIT_URL"]}">打开 innei-dev/yohaku 提交</a>'
              )
          else:
              sha_blob = "（本次运行未完成构建，或无可用提交 SHA）"

          repo = esc(os.environ["GITHUB_REPOSITORY"])
          ref = esc(os.environ["GITHUB_REF_NAME"])
          actor = esc(os.environ["GITHUB_ACTOR"])
          event = esc(os.environ["GITHUB_EVENT_NAME"])
          wf = esc(os.environ["GITHUB_WORKFLOW"])
          rn = esc(os.environ["GITHUB_RUN_NUMBER"])
          ra = esc(os.environ["GITHUB_RUN_ATTEMPT"])
          run_url = os.environ["RUN_URL"]
          completed = esc(os.environ["COMPLETED_AT"])
          sha_ci = esc(os.environ["GITHUB_SHA"][:40])
          route = esc(os.environ["ROUTE"])
          source_ref = esc(os.environ["SOURCE_REF"])

          head_msg = (os.environ.get("COMMIT_MSG_HEAD") or "").strip()
          head_preview = ""
          if head_msg:
              first = head_msg.splitlines()[0]
              one_line = first[:220]
              if len(first) > 220:
                  one_line += "…"
              head_preview = f"<b>编排仓库 HEAD 说明</b>\n{esc(one_line)}"

          parts: list[str] = [
              f"<b>❌ yohaku 部署 / CI 失败 [{route}]</b>",
              f"<b>源分支</b>: <code>{source_ref}</code>",
              f"<b>失败的 job</b>: <code>{failed_line}</code>",
              "",
              "<b>📎 应用源码（若已解析到提交）</b>",
              sha_blob,
              "",
              "<b>🔧 编排仓库 / CI 上下文</b>",
              f"• 仓库: <code>{repo}</code>",
              f"• 分支 / ref: <code>{ref}</code>",
              f"• 触发者 · 事件: {actor} · <code>{event}</code>",
              f"• Workflow: {wf} · #{rn} · attempt <code>{ra}</code>",
              f"• 编排仓库 <code>GITHUB_SHA</code>: <code>{sha_ci}</code>",
          ]

          if head_preview:
              parts.extend(["", head_preview])

          parts.extend(
              [
                  "",
                  f"<b>🕐 时间（UTC）</b> {completed}",
                  "",
                  f'<a href="{run_url}">在 GitHub Actions 打开本次运行</a>',
              ]
          )

          print("\n".join(parts))
          PY
          )"

          jq -n \
            --arg text "$MSG" \
            '{chat_id: "@order_usagi", text: $text, parse_mode: "HTML", disable_web_page_preview: true}' \
            | curl -sS -f -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
              -H "Content-Type: application/json" \
              -d @-
